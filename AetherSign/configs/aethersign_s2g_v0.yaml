task: S2G
device: cuda
do_translation: false
do_recognition: true

data:
  dataset_root: ../dataset
  label_dir: ../dataset/label
  npy_dir: ../dataset/npy
  train_label_path: ../dataset/label/train.csv
  dev_label_path: ../dataset/label/dev.csv
  test_label_path: ../dataset/label/test.csv
  gloss_map_path: ../dataset/label/gloss_map.txt
  num_keypoints: 65
  keypoint_format: CTV
  coord_space: normalized_image
  convert_to_centered_coords: true
  random_rotate_degree: 15.0
  time_augment_min: 0.5
  time_augment_max: 1.5
  max_length: 400
  dataset_name: AetherSign
  input_streams: keypoint
  level: word
  txt_lowercase: false
  max_sent_length: 400

gloss:
  gloss2id_file: ../dataset/label/gloss2ids.pkl
  lower_case: false

testing:
  recognition:
    beam_size: 5
    prediction_head: ensemble_last
    report_heads:
      - ensemble_last
      - fuse
      - body
      - left
      - right
  translation: {}

training:
  model_dir: ../outputs/aethersign_mska_s2g_v0
  batch_size: 8
  epochs: 100
  num_workers: 4
  validation:
    recognition:
      beam_size: 1
    translation: {}
  optimization:
    optimizer: Adam
    learning_rate:
      default: 1.0e-3
    weight_decay: 0.001
    betas:
      - 0.9
      - 0.998
    scheduler: cosineannealing
    t_max: 100

model:
  RecognitionNetwork:
    input_type: keypoint
    DSTA-Net:
      net:
        - [64, 64, 16, 7, 2]
        - [64, 64, 16, 3, 1]
        - [64, 128, 32, 3, 1]
        - [128, 128, 32, 3, 1]
        - [128, 256, 64, 3, 2]
        - [256, 256, 64, 3, 1]
        - [256, 256, 64, 3, 1]
        - [256, 256, 64, 3, 1]
